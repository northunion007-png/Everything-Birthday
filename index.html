<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Birthday ❤️</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Tahoma;
}

button {
  padding:15px;
  font-size:20px;
  margin-top:20px;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="p1">
  <h1>یک چیز خاص برای تو...</h1>
  <button id="btn">شروع کن ❤️</button>
</div>

<div id="p2" style="display:none;">
  <h2>الان وارد دنیای من شدی 😍</h2>
  <p>حالا همه چیز درست کار می‌کند ❤️</p>
</div>

<script>
document.getElementById("btn").addEventListener("click", function() {
  document.getElementById("p1").style.display = "none";
  document.getElementById("p2").style.display = "block";
});
</script>

</body>
</html>
