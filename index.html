<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Love ❤️</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:black;
  color:white;
  text-align:center;
}

/* صفحات */
.page {
  display:none;
  padding-top:100px;
}

.active {
  display:block;
}

/* دکمه */
button {
  padding:15px 25px;
  font-size:20px;
  background:#ff4d6d;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* ستاره */
.star {
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite;
}

@keyframes twinkle {
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
</style>

</head>

<body>

<!-- صفحه 1 -->
<div id="p1" class="page active">
  <h1>یک چیز خاص برای تو...</h1>
  <button onclick="go(2)">شروع کن ❤️</button>
</div>

<!-- صفحه 2 -->
<div id="p2" class="page">
  <h2>بالاخره آمدی اینجا 😍</h2>
  <p>این تازه شروعشه...</p>
  <button onclick="go(3)">ادامه ➡️</button>
</div>

<!-- صفحه 3 -->
<div id="p3" class="page">
  <h2>یک نامه برای تو ✉️</h2>
  <button onclick="go(4)">بازش کن</button>
</div>

<!-- صفحه 4 -->
<div id="p4" class="page">
  <h2>عشق من...</h2>
  <p>
تو بهترین اتفاق زندگی منی ❤️<br>
تو دلیل لبخند منی...<br><br>
دوستت دارم...
  </p>
  <button onclick="go(5)">ادامه ❤️</button>
</div>

<!-- صفحه 5 -->
<div id="p5" class="page">
  <h1>تولدت مبارک ❤️</h1>
  <h2>تو تمام دنیای منی</h2>
</div>

<script>

/* تغییر صفحه */
function go(n){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
}

/* ستاره‌ها */
for(let i=0;i<120;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  document.body.appendChild(s);
}

</script>

</body>
</html>
